# Auto/manual deploy for RetrieverRebuild on Windows Server (bggol-vesko01).
#
# Targets ONLY the NSSM service "RetrieverRebuild" / port 8810 via D:\retriever-rebuild\bin\deploy.ps1.
# This workflow does NOT stop, reinstall, or reconfigure legacy "Retriever" on port 8000.
#
# Requires a self-hosted Windows runner on bggol-vesko01 with labels matching `runs-on` below.
# No repository secrets are used; production credentials live only in server-side files.
#
name: Deploy RetrieverRebuild (Windows self-hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref for RetrieverRebuild (branch, tag, or full SHA)
        required: true
        type: string
        default: main
      run_migrations:
        description: Run DB migrations on this deploy (RETRIEVER_RUN_MIGRATIONS=true). Use once per new migration.
        required: false
        type: boolean
        default: false
      assert_migration_0002:
        description: Fail early if migration 0002 is missing (RETRIEVER_ASSERT_MIGRATION_0002=true)
        required: false
        type: boolean
        default: false
      skip_legacy_liveness:
        description: Skip read-only probe of legacy Retriever on localhost:8000 (RETRIEVER_SMOKE_SKIP_LEGACY=true)
        required: false
        type: boolean
        default: false

# One deploy at a time on this host; never cancel an in-flight install.
concurrency:
  group: retriever-rebuild-deploy-bggol-vesko01
  cancel-in-progress: false

jobs:
  deploy:
    name: RetrieverRebuild-only deploy via server script
    runs-on:
      - self-hosted
      - Windows
      - RetrieverRebuild
    defaults:
      run:
        shell: powershell
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout (preflight tooling only)
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: true
          sparse-checkout: deploy

      - name: Runner preflight
        working-directory: ${{ github.workspace }}
        run: |
          & .\deploy\github-runner\preflight.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Sync deploy scripts to server bin
        working-directory: ${{ github.workspace }}
        run: |
          $bin = 'D:\retriever-rebuild\bin'
          $windowsBin = Join-Path $bin 'windows'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          New-Item -ItemType Directory -Force -Path $windowsBin | Out-Null
          foreach ($script in @('deploy.ps1', 'smoke.ps1', 'healthcheck.ps1', 'rollback.ps1')) {
            Copy-Item -Force (Join-Path '.\deploy' $script) $bin
          }
          Copy-Item -Force .\deploy\github-runner\post-deploy-feedback.ps1 $bin
          Copy-Item -Force .\deploy\windows\*.ps1 $windowsBin
          # NSSM launches bin\run-service.ps1; keep this path in sync with the windows scripts copy.
          Copy-Item -Force .\deploy\windows\run-service.ps1 (Join-Path $bin 'run-service.ps1')

      - name: Deploy via D:\retriever-rebuild\bin\deploy.ps1
        env:
          DEPLOY_GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.sha }}
          RETRIEVER_RUN_MIGRATIONS: ${{ inputs.run_migrations && 'true' || '' }}
          RETRIEVER_ASSERT_MIGRATION_0002: ${{ inputs.assert_migration_0002 && 'true' || '' }}
          RETRIEVER_SMOKE_SKIP_LEGACY: ${{ inputs.skip_legacy_liveness && 'true' || '' }}
        run: |
          $ref = $env:DEPLOY_GIT_REF.Trim()
          if (-not $ref) { Write-Error 'DEPLOY_GIT_REF is empty.'; exit 1 }
          Write-Host "=== GitHub Actions: invoking server deploy.ps1 Ref=$ref ==="
          Write-Host "Target: RetrieverRebuild / port 8810 only - legacy Retriever on 8000 is not managed by deploy.ps1."
          $deployScript = 'D:\retriever-rebuild\bin\deploy.ps1'
          if (-not (Test-Path $deployScript)) {
            Write-Error "Deploy script not found at $deployScript. Copy repo deploy\*.ps1 per deploy/VM_SETUP_RUNBOOK.md."
            exit 1
          }
          powershell -ExecutionPolicy Bypass -File $deployScript $ref
          exit $LASTEXITCODE

      - name: Post-deploy feedback (machine-readable)
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          RETRIEVER_SMOKE_SKIP_LEGACY: ${{ inputs.skip_legacy_liveness && 'true' || '' }}
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE 'deploy-feedback'
          $feedbackScript = Join-Path $env:GITHUB_WORKSPACE 'deploy\github-runner\post-deploy-feedback.ps1'
          if (-not (Test-Path -LiteralPath $feedbackScript)) {
            Write-Error "Missing $feedbackScript"
            exit 1
          }
          & $feedbackScript -OutputDir $outDir -RunSmoke
          $fbExit = $LASTEXITCODE
          $summary = Join-Path $outDir 'FEEDBACK_SUMMARY.md'
          Write-Host ""
          Write-Host "=== FEEDBACK_SUMMARY (concise) ==="
          if (Test-Path -LiteralPath $summary) {
            Get-Content -LiteralPath $summary | Write-Host
          } else {
            Write-Host "(summary file missing)"
          }
          Write-Host "=== End FEEDBACK_SUMMARY ==="
          exit $fbExit

      - name: Upload deploy feedback artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retriever-rebuild-deploy-feedback
          path: deploy-feedback/
          if-no-files-found: warn
