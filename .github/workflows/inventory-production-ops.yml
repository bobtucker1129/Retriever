name: Inventory Production Ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Operation to run"
        required: true
        type: choice
        options:
          - diagnose
          - grant-app-user
        default: diagnose

jobs:
  inventory-ops:
    runs-on:
      - self-hosted
      - Windows
      - RetrieverRebuild
    defaults:
      run:
        shell: powershell
    permissions:
      contents: read
    steps:
      - name: Inventory DB diagnose or grant
        env:
          INVENTORY_OP: ${{ inputs.operation }}
        run: |
          $ErrorActionPreference = "Stop"
          $envFile = "D:\retriever-rebuild\env\retriever.env"
          if (-not (Test-Path -LiteralPath $envFile)) {
            Write-Error "Missing RetrieverRebuild env file"
            exit 1
          }

          function Read-EnvFile($path) {
            $map = @{}
            Get-Content -LiteralPath $path | ForEach-Object {
              $line = $_.Trim()
              if (-not $line -or $line.StartsWith("#") -or -not $line.Contains("=")) { return }
              $parts = $line.Split("=", 2)
              $map[$parts[0]] = $parts[1]
            }
            return $map
          }

          $envMap = Read-EnvFile $envFile
          foreach ($key in $envMap.Keys) {
            [Environment]::SetEnvironmentVariable($key, $envMap[$key], "Process")
          }

          $oldConfig = "D:\Repository\pm-review-dashboard-ContexEng\config.py"
          if (-not (Test-Path -LiteralPath $oldConfig)) {
            Write-Error "Missing old Retriever config reference"
            exit 1
          }

          $py = @'
          import os
          import re
          import sys
          from pathlib import Path

          import mysql.connector

          op = os.environ.get("INVENTORY_OP", "diagnose")
          old_config = Path(r"D:\Repository\pm-review-dashboard-ContexEng\config.py").read_text(encoding="utf-8")

          def old_default(name, fallback=""):
              pattern = rf"{name}:\s*str\s*=\s*os\.getenv\('{name}',\s*'([^']*)'\)"
              match = re.search(pattern, old_config)
              return match.group(1) if match else fallback

          switch_host = os.environ.get("SWITCH_DB_HOST") or old_default("SWITCH_DB_HOST")
          switch_user = os.environ.get("SWITCH_DB_USER") or old_default("SWITCH_DB_USER")
          switch_password = os.environ.get("SWITCH_DB_PASSWORD") or old_default("SWITCH_DB_PASSWORD")
          app_host = os.environ.get("MYSQL_HOST")
          app_port = int(os.environ.get("MYSQL_PORT") or "3306")
          app_user = os.environ.get("MYSQL_USER")
          app_password = os.environ.get("MYSQL_PASSWORD")
          inventory_db = os.environ.get("INVENTORY_MYSQL_DATABASE") or "retriever_inventory"

          if not all([switch_host, switch_user, switch_password, app_host, app_user, app_password]):
              print("required_values=missing")
              sys.exit(2)

          def app_can_inventory():
              try:
                  conn = mysql.connector.connect(
                      host=app_host,
                      port=app_port,
                      user=app_user,
                      password=app_password,
                      database=inventory_db,
                      connection_timeout=5,
                  )
                  cur = conn.cursor()
                  cur.execute("SELECT COUNT(*) FROM products")
                  count = cur.fetchone()[0]
                  cur.close()
                  conn.close()
                  return True, count, None
              except Exception as exc:
                  return False, None, f"{type(exc).__name__}: {exc}"

          ok, count, err = app_can_inventory()
          print(f"before_app_inventory_ok={ok}")
          if ok:
              print(f"before_product_count={count}")
          else:
              print(f"before_error={err}")

          if op == "grant-app-user":
              admin = mysql.connector.connect(
                  host=switch_host,
                  user=switch_user,
                  password=switch_password,
                  connection_timeout=5,
              )
              cur = admin.cursor()
              cur.execute(f"CREATE DATABASE IF NOT EXISTS `{inventory_db}` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci")
              cur.execute(
                  "SELECT Host FROM mysql.user WHERE User = %s",
                  (app_user,),
              )
              hosts = [row[0] for row in (cur.fetchall() or [])]
              if not hosts:
                  print("grant_status=app_user_not_found")
                  sys.exit(3)
              for host in hosts:
                  cur.execute(
                      f"GRANT SELECT, INSERT, UPDATE, DELETE ON `{inventory_db}`.* TO %s@%s",
                      (app_user, host),
                  )
              cur.execute("FLUSH PRIVILEGES")
              cur.close()
              admin.close()
              print(f"grant_status=granted_hosts_{len(hosts)}")

          ok, count, err = app_can_inventory()
          print(f"after_app_inventory_ok={ok}")
          if ok:
              print(f"after_product_count={count}")
          else:
              print(f"after_error={err}")
              sys.exit(4)
          '@

          $tmp = Join-Path $env:RUNNER_TEMP "inventory_ops.py"
          Set-Content -LiteralPath $tmp -Value $py -Encoding UTF8
          $python = "D:\retriever-rebuild\current\.venv\Scripts\python.exe"
          if (-not (Test-Path -LiteralPath $python)) {
            $python = "python"
          }
          & $python $tmp
